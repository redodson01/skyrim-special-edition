nexusDescription="[center][b][color=#cc4125][img]https://staticdelivery.nexusmods.com/mods/110/images/headers/111138_1646075027.jpg[/img]﻿[/color]\n<br />[color=#3d85c6][size=5]NORTHERN GOD ARMOR[/size][/color][/b]\n<br />[b][color=#9fc5e8][size=3]My Patches by Xtudo[/size][/color][/b][/center][b][color=#9fc5e8]Description[/color][/b]\n<br />[b]Several patches for this wonderful armor made by 4thUnknown.[/b]\n<br />\n<br />[b][color=#9fc5e8]Patches[/color]\n<br />[/b][list][*]Male weight sliders. (It will conflict with the HDT-SMT patch)\n<br />[*]Female weight sliders with a subtle feminine version. (It will conflict with the HDT-SMT patch)\n<br />[*]Brown fabric color.\n<br />[*]Black HD fur color.\n<br />[*]HD hair, original and black colors.\n<br />[*]Silver color for the metallic parts.\n<br />[*]Optional 2K optimized textures.\n<br />[*]Several fixes and tweaks (already included in the all the patches).\n<br />[*][b]Optional Immersive Armors - Spellbinder replacer[/b]. Requires one of the Main files installed first, but only meshes and textures. Ay other optional file will work with it, as colors, weight sliders, etc.\n<br />[/list]\n<br />[b][color=#6fa8dc]Fixes (v1)[/color][/b]\n<br />[list]\n<br />[*]Leg clipping fixed, there's still a minor clip, but it's hardly noticeable.\n<br />[*]Other minor clippings fixed.\n<br />[*]Improved alpha channel for the chain diffuse texture.\n<br />[*]HD fur and hair, original color.\n<br />[*]Fixed the first-person female armor reference.\n<br />[*]Changed footstep sounds to heavy armor.\n<br />[*]Removed some dirty cell edits.\n<br />[*]Added the \"Warm\" keyword to the armor pieces for the Survival Mode.\n<br />[*]Carried-on the last Unofficial Patch fixes.\n<br />[/list][b][color=#6fa8dc]Fixes (v1.1)[/color][/b]\n<br />[list][*]Fixed the helmet/body gap when not using the body armor.  (It will conflict with the HDT-SMT patch)\n<br />[/list][b][color=#6fa8dc]Fixes (v1.2)[/color][/b]\n<br />[list]\n<br />[*]Fixed unweighted vertices on the female gauntlets.\n<br />[/list][b][color=#6fa8dc]Fixes (v1.5)[/color][/b]\n<br />[list]\n<br />[*]Minor fix to the closed female helmet.\n<br />[*]WeapMaterialEbony and VendorItemWeapon keyword added to The Judge's Axe.\n<br />[*]ESP flagged as ESL.\n<br />[/list]\n<br />[b][color=#9fc5e8]Recommended installation order[/color][/b][list]\n<br />[*]Fixes (recommended)\n<br />[*]Male weight slider (recommended)\n<br />[*]Female weight slider (recommended)\n<br />[*]Open helmet version (optional)\n<br />[*]2K version (optional)\n<br />[*]Any color changer (optional)\n<br />[/list]\n<br />- [url=https://www.nexusmods.com/skyrim/mods/111138]LE version here[/url]﻿﻿.\n<br />\n<br />[b][color=#9fc5e8]Requirements[/color][/b]\n<br />[list]\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/63772]Northern God Armor[/url]﻿﻿﻿﻿ ﻿﻿by 4thUnknown.\n<br />[/list]\n<br />[b]I made it for my game and now I'm sharing it, I hope you like it. [/b]\n<br />[i]Don't forget to endorse and share your screens. :)[/i]\n<br />\n<br />[b][color=#9fc5e8]Especial thanks[/color][/b]\n<br />[list]\n<br />[*]To [url=https://www.nexusmods.com/skyrim/users/49002333]4thUnknown [/url]﻿﻿﻿of course, for his wonderful work as always!\n<br />[/list]\n<br />\n<br />[center][url=https://ko-fi.com/xtudo][img]https://i.imgur.com/huDtp6A.png[/img][/url][/center]\n<br />[center][size=3][b]Do you like my mods or stories?\n<br />Please support me on [url=https://www.patreon.com/Xtudo]Patreon[/url]. [/b]\n<br />[/size][url=https://www.patreon.com/Xtudo][img]https://staticdelivery.nexusmods.com/mods/1704/images/51726/51726-1625164958-1101084130.jpeg[/img][/url][/center]"
