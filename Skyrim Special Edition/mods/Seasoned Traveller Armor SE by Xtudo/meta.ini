nexusDescription="[b][center][size=6][color=#b4a7d6][img]https://staticdelivery.nexusmods.com/mods/110/images/headers/112322_1656103902.jpg[/img]﻿[/color]\n<br />[color=#6aa84f]SEASONED TRAVELLER[/color][/size]\n<br />[color=#f6b26b][size=4]By Xtudo[/size][/color][/center][/b]\n<br />[b][color=#b6d7a8]Description[/color][/b]\n<br />[b]A beautiful protective standalone armor and accessories for explorers and adventurers.[/b]\n<br />[list]\n<br />[*]Male and female versions.\n<br />[*]Weight sliders.\n<br />[*]Five colors available.\n<br />[*]One handed and two handed swords.\n<br />[*]Backpacks.\n<br />[*]A Pickaxe.\n<br />[*]A Walking Stick.\n<br />[*]You can craft all the items at any forge, and you can temper them too.\n<br />[*]4K and 2K versions.\n<br />[*]No HDT required.\n<br />[*]HDT-SMP optional patch.\n<br />[*]Full support for beast races.\n<br />[*]Survival \"warm\" keyword added.\n<br />[*]Optional low level player version.\n<br />[*]Optional high level player versions.\n<br />[*]BSA. ESL.\n<br />[/list]\n<br />[b][color=#b6d7a8]Optional patches[/color][/b]\n<br />[list]\n<br />[*][b]HDT-SMP version.[/b] Requires [url=https://www.nexusmods.com/skyrimspecialedition/mods/57339]FSMP - Faster HDT-SMP[/url]﻿ and one of the Main downloads installed first.\n<br />[*][b]Slightly brighter weapons patch.[/b] If you find the weapons a bit dark, this could help. Only meshes and textures. It's fine to install/uninstall at any time.\n<br />[*][b]Low Level Player version.[/b] Same stats than the vanilla Studded and Leather armors.\n<br />[*][b]High Level Player versions. [/b]Two options available : Armor and weapons [b]Glass tier[/b]. Armor [b]Dragonplate[/b] and weapons [b]Daedric tier[/b]. Same perks, crafting and temper items are required.\n<br />[*][b]Unenchanted Walking Stick version.[/b] Default Main file, Low Level Player version and High Level Player versions options (folders) available in the same file, install only one. It's fine to switch mid-game.\n<br />[*][b]Bedroll Shown patch.[/b] It will shown the bedroll under the backpacks. Works with any version. Only textures.\n<br />[*][b]Walking Stick Staff addon[/b]. It will use the lovely Alternate Movement from the [url=https://www.nexusmods.com/skyrimspecialedition/mods/71110]Goetia Animations - Enchanted Staves[/url]﻿ mod. Or similar mods.\n<br />[*][b]Optional No Bandolier and Satchel patch[/b].\n<br />[*][b]Optional Seasoned Traveller Pickaxe animation patch.[/b] It will replace the vanilla Ancient Nordic Pickaxe model in the mining animation when using the Seasoned Traveller Pickaxe. Beware the Seasoned Traveller Pickaxe model with used when mining with the Ancient Nordic Pickaxe as well.\n<br />[/list]\n<br />- [url=https://www.nexusmods.com/skyrim/mods/112322]LE version here[/url]﻿.\n<br />\n<br />[center][youtube]GGD1WYBTmMY[/youtube][/center]\n<br />\n<br />[b]I made it for my game and now I'm sharing it, I hope you like it.[/b][i]\n<br />[/i]\n<br />[b][color=#b6d7a8]Credits[/color][/b]\n<br />[list]\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/users/2742410][/url][url=https://www.nexusmods.com/skyrimspecialedition/users/96618133][/url][url=https://www.nexusmods.com/skyrimspecialedition/users/6052912]Fuse00[/url] for the wonderful [url=https://www.nexusmods.com/skyrimspecialedition/mods/68199]armor[/url]﻿﻿ and[url=https://www.nexusmods.com/skyrimspecialedition/mods/67440] backpack[/url]﻿﻿ used as base for this mod.\n<br />[*][url=https://www.nexusmods.com/skyrim/users/187943]Chesko[/url] for the walking stick.\n<br />[*][url=https://www.nexusmods.com/skyrim/users/1734939]Billyro[/url] for the swords and pickaxe.\n<br />[/list]\n<br />[b][color=#b6d7a8]Especial thanks[/color][/b][list]\n<br />[*]To Fuse00, Chesko and Billyro for their awesome work.\n<br />[*]To my lovely [url=https://www.patreon.com/Xtudo]Patreons[/url]﻿ and supporters.\n<br />[/list]\n<br />\n<br />[center][url=https://ko-fi.com/xtudo][img]https://i.imgur.com/huDtp6A.png[/img][/url][/center]\n<br />[size=3][b][center]Do you like my mods or stories?\n<br />Please support me on [url=https://www.patreon.com/Xtudo]Patreon[/url].[/center][/b][/size][url=https://www.patreon.com/Xtudo][img]https://staticdelivery.nexusmods.com/mods/1704/images/51726/51726-1625164958-1101084130.jpeg[/img][/url]"
