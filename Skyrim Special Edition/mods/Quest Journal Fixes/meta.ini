nexusDescription="This mod patches the quest_journal.swf file such that the difficulty persists when you change it, it's been patched across most if not all skin mods for SkyUI.\n<br />\n<br />On top of that, the original [url=https://www.nexusmods.com/skyrimspecialedition/mods/106418]Persistence Fix[/url]﻿ only worked on 1.6.1130 and using the file in any version prior to that would result in a crash, now that's been fixed due to the quest_journal.swf file detecting your Skyrim version and patching it dynamically, this second thing is more of a modders resource so that all skin mods only need one file when they update.\n<br />\n<br />Patches for:\n<br />[list]\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/12604]SkyUI[/url]﻿\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/28334]SkyUI - Remove Quick Save[/url]﻿\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/49881]NORDIC UI[/url]﻿\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/54102]NORDIC UI - Miscellaneous Patches - Remove Quick Save[/url]﻿\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/23010]Dear Diary[/url]﻿\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/60837]Dear Diary Dark Mode (white text)[/url]﻿\n<br />[*]Dear Diary Dark Mode (warm text)\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/75188]Untarnished UI[/url]﻿\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/73208]Dragonbreaker UI (BG &amp; no BG)[/url]﻿\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/87113]New Horizons UI[/url]﻿\n<br />[/list]\n<br />Credits:\n<br />[list]\n<br />[*]Jelidity for helping me and writing the code that made this possible, I only did the implementation and some help on the sidelines.\n<br />[*]SkyUI team for SkyUI\n<br />[*]outobugi &amp; myztikrice for NORDIC UI\n<br />[*]uranreactor for Remove Quick Save, Dear Diary, and Dear Diary Dark Mode\n<br />[*]Vorganger for Untarnished UI\n<br />[*]rob18 for Dragonbreaker UI and New Horizons UI\n<br />[*]Das for helping me test the fixes across versions.\n<br />\n<br />[/list]"
