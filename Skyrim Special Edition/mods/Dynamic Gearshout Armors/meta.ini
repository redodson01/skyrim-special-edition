nexusDescription="Parapets' [url=https://www.nexusmods.com/skyrimspecialedition/mods/65963]Dynamic Armor Variants[/url] can automatically lower your headgear under certain conditions.\n<br />\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/users/3889166?tab=user+files]Gearshout's[/url] armors have lowered hood meshes included. \n<br />\n<br />I, [i]without talent for meshes[/i], went through all of the armors I had installed to use them in said framework.\n<br />\n<br />You lower your hood automatically upon entering save interiors without equipping the lowered hood variant.\n<br />This mod does not distribute any file from the original mods and therefor obviously needs the armors you want to use and Dynamic Armor Variants downloaded.\n<br />\n<br />[url=https://www.patreon.com/Styyx][img]https://github.com/doodlum/nexusmods-widgets/blob/main/Patreon_40px.png?raw=true[/img][/url]\n<br />\n<br />[b]Currently[/b] used armors:\n<br />\n<br />[list]\n<br />[*]Nord Raven Battle Armor\n<br />[*]Royal Elven Armor\n<br />[*]Black Bear Ancient Nord Armor\n<br />[*]Rogue Nord Armor\n<br />[*]Rogue Light Elven Armor\n<br />[*]Steel Elven Battle Mage Armor\n<br />[*]Mercenary Light Iron Armor\n<br />[*]Nord Tribal Armor\n<br />[/list]\n<br />[color=#ff0000][size=6]Credits: [/size][/color]\n<br />\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/users/39501725]Parapets[/url]﻿ for Dynamic Armor Variants\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/users/3889166]Gearshout[/url]﻿ for a lot of great armors"
