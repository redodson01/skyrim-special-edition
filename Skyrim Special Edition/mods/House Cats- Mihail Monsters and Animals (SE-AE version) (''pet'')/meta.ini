nexusDescription="[center][right][/right][left][right][/right][/left][left][font=Times New Roman][size=5][img]https://i.imgur.com/UFc8HyQ.png[/img]﻿[/size]\n<br />[/font][list]\n<br />[*][font=Times New Roman][size=4][i]If you use, like and value my work, please consider giving an endorsement. I've worked hard for years to offer you the best of me for free, and the only thing I ask in return is this gesture, which increases my relevance and engagement on Nexus, and motivates me to continue;[/i][/size][/font]\n<br />[*][color=#f4f4f4][font=Times New Roman][size=4][i]I do not inspect or have any influence over translations of my mods (including those linked directly on my pages), nor do I have any power over patches or add-ons made to my content. So, before using any unofficial add-ons for my mods, make sure they conform to the latest version of my official release, and never use these if they don't. The same applies to Xbox ports;[/i][/size][/font][/color]\n<br />[*][color=#f4f4f4][font=Times New Roman][size=4][i]In addition to the Nexus, you can also find me on:[/i][/size][/font][/color]\n<br />[color=#f4f4f4][font=Times New Roman][size=3][i][url=https://www.patreon.com/mihailmods][img]https://i.imgur.com/zDPm8km.png[/img][/url]﻿    [url=https://discord.com/invite/Mt4yFqy][img]https://i.imgur.com/o4LA7mq.png[/img][/url]﻿     [url=https://www.youtube.com/channel/UCDAJ544nxvKxzrc2CxxVvwQ][img]https://i.imgur.com/SwGHxjF.png[/img][/url]﻿﻿   ﻿﻿﻿﻿[/i][/size][/font][/color][*][color=#f4f4f4][font=Times New Roman][size=4][i]Do you have any doubt? Read my [url=https://www.nexusmods.com/skyrimspecialedition/articles/4082]Frequently Asked Questions (FAQ)[/url]﻿.[/i][/size][/font][/color]\n<br />[/list][font=Times New Roman][size=4]﻿[/size]\n<br />\n<br />[size=4][img]https://i.imgur.com/wk2Fcf3.png[/img][/size]\n<br />[img]https://i.imgur.com/PwJxVUw.png[/img]\n<br />[i][size=5]\"House cats are docile little felines, often kept as pets in towns and villages. Although initially domesticated to hunt rats that destroyed food and spread diseases, the excess of pampering and treats made most city cats have chubby bodies and lazy behavior. In Skyrim, you'll see them in almost every city and farm, sometimes inside houses as well. The Bards College has a curious unique pet cat called Puss in Boots, dark in color and wearing a pair of booties and a hat with a white feather on top, which in a way confirms that house cats have long since abandoned their roles of pest controllers.\"[/size][/i]\n<br />\n<br />[color=#000000][size=4]by Beastmaster Mihail *[/size][/color]\n<br />[size=2](*Who is Beastmaster Mihail? He is my avatar/persona within the universe composed of all my mods. He is the ingame author who writes the texts that are usually presented as descriptions for my mods. A former monster hunter, now a dedicated scholar, he is planned to be released as an NPC in late 2022/early 2023, doing the same job in-game as my descriptions do on Nexus.)[/size]\n<br />[size=4]\n<br />\n<br />\n<br />[/size][img]https://i.imgur.com/XwFuxsS.png[/img][size=4]﻿[/size]\n<br />[size=5]- 1 new creature- House Cat (in 2 variants: common House Cat \n<br />and the unique named cat Puss in Boots)[/size]\n<br />\n<br />\n<br />\n<br />[size=4][img]https://i.imgur.com/C4xQPy7.png[/img]﻿[/size]\n<br />[size=5]So far no incompatibilities have been found between this mod and other mods.\n<br />[/size][color=#f4f4f4](OBS- If by chance when installing several of Mihail's mods at the same time you are asked about files overwriting those of other Mihail mods or other authors mods, don't worry because they are just the same files shared between mods. I recommend that on these occasions always give preference to the files contained in my mods, and among mine always give preference to the mod you are installing last.)\n<br />[/color]\n<br />\n<br />[img]https://i.imgur.com/C3cLO6f.png[/img]\n<br />[size=4]The Mihail Monsters and Animals series aims to create and make available to the community the most complete set of creatures for TES 5: Skyrim, implemented in an immersive and unique way, with respect to the pillars of lore. Instead of pathetically just throwing models and textures in the game reusing 100% vanilla mechanics, the creatures made by Mihail have uniqueness and extreme zeal in their idealization and implementation, which will provide you with an experience that you have never had before in this area.\n<br />[/size]\n<br />\n<br />\n<br />[size=4]\n<br />[/size][img]https://i.imgur.com/amFA4g0.png[/img][size=4]﻿[/size]\n<br />[size=5]Author: [/size]\n<br />\n<br />[size=4]Mihail- re-modelling of the cat model,  animations, 4k re-texture [/size]\n<br />[size=4]of the original textures, sounds, game implementation;[/size]\n<br />\n<br />\n<br />\n<br />[size=5]Some assets used on this mod belong to:[/size]\n<br />\n<br />[size=4][url=http://en.cdprojektred.com/]CD PROJEKT RED[/url] - original model and textures.[/size]\n<br />[/font][/left][/center]"
