nexusDescription="[center][i][url=https://www.nexusmods.com/users/5201727?tab=user+files&amp;BH=2][img]https://i.imgur.com/Pvfeiqq.png[/img][/url]﻿  [url=https://www.twitch.tv/jayserpa][img]https://i.imgur.com/NQIZcnZ.png[/img][/url]﻿  [url=https://www.patreon.com/JaySerpa][img]https://i.imgur.com/uGltkW7.png[/img][/url]\n<br />\n<br />Kudos to the person that came up with the idea: fat_mothra[/i][i]\n<br />\n<br />[/i][/center]If it's a Nord tradition, dear Bethesda, why is our character the ONLY ONE following the tradition? Is no one else in Skyrim actively looking for marriage?! Is it all lies and Maramal just scammed 200 Gold out of me?I fixed these issues by making NPCs also be [s]on tinder[/s] on the lookout for a husband or wife.\n<br />\n<br />I thought this was an easy one, so why not.\n<br />\n<br />[b]Features:\n<br />[/b][list]\n<br />[*]NPCs in the marriage faction (those you can \"propose to\" when you are wearing an Amulet of Mara) have a 25% chance to be equipped with an amulet of Mara themselves, thanks to SPID dark magic.\n<br />[*]If the NPC in question is wearing an amulet and they're friendly towards you, then you can ask them out, no need to buy an Amulet yourself, following the Nord tradition.\n<br />[*]Simple and to the point. It does not edit the marriage quest, but I've added a more fitting dialogue option for these cases. Your character will say: \"Is that an Amulet of Mara? Are you... interested in me?\" and vanilla dialogue will follow. \n<br />[*][b]2.0 Update[/b]: No need to go speak to Maramal to learn the Nord marriage tradition: [b]Nords will already know this from the start[/b]. Other races can get a pamphlet from your local courier to get the info they need without having to travel to Riften. Just ask the courier.\n<br />[*][b]2.0 Update[/b]: Mod includes a brand new feature to cancel your engagement with NPCs. Just let them know you've changed your mind and choose someone else! In vanilla this happens unimmersively in the background :(\n<br />[*][b]2.0 Update[/b]: If your better half dies before the wedding, the marriage system will no longer lock you out of a wedding, unlike in vanilla. You can now tell Maramal the bad news and you can find yourself another waifu or husbando. All voiced, of course.\n<br />[*][b]2.0 Update[/b]: Compatible with the newly released [url=https://www.nexusmods.com/skyrimspecialedition/mods/67930]Immersive Rejections[/url]﻿.\n<br />[/list]\n<br />\n<br />[center][b][size=5]Immersive Rejections\n<br />[/size][/b]\n<br />For more fun stuff related to proposals and amulets, check out my mod [url=https://www.nexusmods.com/skyrimspecialedition/mods/67930]Immersive Rejections[/url]﻿.[/center]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/67930][img]https://i.imgur.com/81SDJ9Z.png[/img][/url]\n<br />[center][b][size=4]\n<br />\n<br />FAQ[/size][/b][/center]\n<br />[b]- Can I customize the chance of them having an amulet? \n<br />[/b]If 25% chance is not enough, you can increase or decrease the chance of marriage candidates from having the amulet just by editing the ini file included in my mod. Changing where it says 25 to 100 will give all marriage candidates an amulet, for example.\n<br />\n<br />[b]- ESL marked?\n<br />[/b]Yes.\n<br />\n<br />[b]- Does this modify outfits?\n<br />[/b]No, it's done via SPID + spell that equips the amulet.\n<br />\n<br />[b]- But I'm a male, will the dialogue show up with male marriage candidates if they are wearing an amulet and I'm not?\n<br />[/b]I better not see this question or I'll be pissed. I think we already went through this a couple of months ago. The answer is [b]yes, as per vanilla behaviour[/b]. If you are SO insecure that you have a problem with this, please go away and never download any of my mods. It's a dialogue option. You choose it or you don't. Bye.[b]\n<br />[/b][b]\n<br />\n<br />[center][i]This mod is now included in\n<br />[/i][url=https://next.nexusmods.com/skyrimspecialedition/collections/qdurkx][img]https://i.imgur.com/YfgAA8V.png[/img][/url]﻿[i]\n<br />[/i][size=3]?️ A Dynamic World - ? Roleplaying - ? Immersion - [url=https://emojipedia.org/balloon]?[/url] Performance Friendly - ?️ 1-Click Installation[/size]\n<br />[/center][/b]"
