nexusDescription="[center][size=4][img]https://staticdelivery.nexusmods.com/mods/110/images/headers/117542_1706994392.jpg[/img]﻿\n<br />[/size][color=#cc4125][size=5][b]COLOVIAN PRINCE SET[/b][/size][/color][/center][center][color=#a61c00][size=4][b]My patches by Xtudo[/b][/size][/color][/center][b]\n<br />[color=#dbb0a7]Description[/color][/b]\n<br />[b]My patches and tweaks for this amazing mod..[/b]\n<br />[list]\n<br />[*]Full beast races support for the helmet.\n<br />[*]New more feminine female helmet version, it was the male version before.\n<br />[*]Fixed cape model and textures.\n<br />[*]Fixed weight 100 female gloves and boots.\n<br />[*]Fixed first person female armor model.\n<br />[*]Amulets are now concealed.\n<br />[*]Added missing blood decals to the axe.\n<br />[*]Improved collision of all ground items.\n<br />[*]Fixed the invisible ground armor item.\n<br />[*]Added \"Warm\" keyword for the Survival Mode.\n<br />[*]ESL file that works with any Skyrim version. It will replace the original ColovianPrince.esl file.\n<br />[*]The default Main Fixes file is fully compatible with 3BA, SAM or similar patches. Just install them after my files.\n<br />[*][b]Optional Non-HDT [/b]patch. All fixes already included. Non compatible with 3BA or similar patches.\n<br />[*][b]Optional Helmet See Trough Eyes [/b]patch. Requires one of the Main files installed first.\n<br />[*][b]Optional Heavy Armor version.[/b] It adds an extra heavy armored version, while keeping the original light as well. So, you will have the two versions available in-game. Ebony tier. Ebony Smithing Crafting Perk required. Requires one of the Main files installed first. It's safe to install mid-game, you won't loose any already crafted item.\n<br />[*][b]Optional Only Heavy Armor version[/b]. It doesn't include the light armor version.\n<br />[*][b]Optional Vanilla Steel Armor replacer.[/b] Requires one of the Main files installed first.\n<br />[/list]\n<br />[b]I made it for my game and now I'm sharing it, I hope you like it.\n<br />\n<br />[/b]- [url=https://www.nexusmods.com/skyrim/mods/117542]LE version here[/url].\n<br />\n<br />[b][color=#dbb0a7]Credits[/color][/b]\n<br />[list]\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/users/3180451][/url][url=https://www.nexusmods.com/skyrimspecialedition/users/122433248]Pulcharmsolis[/url] for his wonderful work.\n<br />[/list]\n<br />[b][color=#dbb0a7]Especial thanks[/color][/b][list]\n<br />[*]To [b]Pulcharmsolis [/b]and to my lovely [url=https://www.patreon.com/Xtudo]Patreons[/url]﻿ and supporters.\n<br />[/list]\n<br />[center][url=https://ko-fi.com/xtudo][img]https://i.imgur.com/huDtp6A.png[/img][/url][/center]\n<br />[size=3][center][b]Hello friends! Do you like my mods or stories?\n<br />Please support me on [url=https://www.patreon.com/Xtudo]Patreon[/url].[/b][/center][/size][url=https://www.patreon.com/Xtudo][img]https://staticdelivery.nexusmods.com/mods/1704/images/51726/51726-1625164958-1101084130.jpeg[/img][/url]"
