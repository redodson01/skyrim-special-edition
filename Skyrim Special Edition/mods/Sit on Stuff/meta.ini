nexusDescription="[color=#6d9eeb][size=3][b]Description[/b][/size][/color][size=2]\n<br />\n<br />[/size][list]\n<br />[*][size=2]This mod allows you to sit on some predefined objects in hunter, bandit, forsworn and other camps where only NPCs could sit before. [/size]\n<br />[*][size=2]They behave like normal furniture - just activate an object to sit on it.[/size]\n<br />[*][size=2]Currently only covers objects that are intended for sitting. Stumps, landscape and random objects aren't covered.[/size]\n<br />[*][size=2]Edits specific object instances, not all objects of some type.[/size]\n<br />[*][size=2]26 specific objects in total at the moment (you can suggest more to me): 13 \"stumps\" (chopping blocks), 1 rock, 2 crates and 10 cut logs.[/size]\n<br />[*][size=2]Technically this mod uses existing invisible sitting markers that NPCs use (i only placed one myself where the existing one couldn't be used). It replaces static objects with activators that pass the activation to the closest invisible sitting marker.[/size]\n<br />[/list][color=#6d9eeb][size=3][b]Requirements[/b][/size][/color][size=2]\n<br />\n<br />[/size][list]\n<br />[*][size=2][url=https://www.nexusmods.com/skyrimspecialedition/mods/60805]Base Object Swapper[/url]﻿[/size]\n<br />[*][size=2](Recommendation) [url=https://www.nexusmods.com/skyrimspecialedition/mods/26138]Skyrim Landscape and Water Fixes[/url] fixes issues with some of the modified objects[/size]\n<br />[/list][color=#6d9eeb][size=3][b]Compatibility[/b][/size][/color][size=2]\n<br />\n<br />[/size][list]\n<br />[*][size=2]This mod is highly compatible thanks to Base Object Swapper. Load order doesn't matter.[/size]\n<br />[*][size=2]If some mod redirects any of the base objects to a different mesh (by a different path), the specific objects touched by this mod won't be affected. A patch can be made by editing the mesh path of the Activator object from this mod. Normal mesh and texture replacers are compatible. A patch for [url=https://www.nexusmods.com/skyrimspecialedition/mods/159470]Sitting on Sensible Stumps AKA Suitable Stumps of Skyrim BOS[/url]﻿ is available.[/size]\n<br />[*][size=2]A consistency patch for [url=https://www.nexusmods.com/skyrimspecialedition/mods/113255]Take a Nap - Sleep on Chairs[/url]﻿ is available. This patch allows to sleep on the objects modified by Sit on Stuff, which aren't supported by Take a Nap without this patch because [size=2] technically[/size] they're not furniture.[/size]\n<br />[/list][line]\n<br />[center][b][color=#6d9eeb][size=3]Check my other mods:[/size][/color][/b]\n<br />\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/78177]Rent Inn Room for Longer Time and Extend Time[/url]﻿ | [url=https://www.nexusmods.com/skyrimspecialedition/mods/61123]Farmers Miners Fishermen Are Vendors[/url]﻿﻿ | [url=https://www.nexusmods.com/skyrimspecialedition/mods/87111]Motionless Rocks Killing People Fix[/url]﻿ | [url=https://next.nexusmods.com/profile/lilebonymace/mods?gameId=1704]and more[/url]﻿[/center]"
