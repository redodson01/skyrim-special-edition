nexusDescription="[center][b][color=#cc4125][img]https://staticdelivery.nexusmods.com/mods/1704/images/headers/60893_1640715107.jpg[/img]﻿[/color]\n<br />[color=#45818e][size=5]﻿Wind Ruler Armor - My patches[/size][/color][/b]\n<br />[b][color=#76a5af][size=3]By Xtudo[/size][/color][/b][/center]\n<br />[b][color=#76a5af]Description[/color][/b]\n<br />[b]Several patches for this wonderful armor made by 4thUnknown.\n<br />\n<br />[color=#76a5af]Important: [/color][/b]The HDT-SMP version is not ALL compatible, it will conflict with my patches that edits the armor's meshes, like the weight sliders. The texture ones, the one handed sword, are good to go.\n<br />\n<br />[b][color=#76a5af]Recommended installation order:[/color][/b][list]\n<br />[*]Fixes or Light Armor version SE or Unenchanted Helmet SE.\n<br />[*]Bigger helmets SE.\n<br />[*]Male weight sliders SE or HIMBO version.\n<br />[*]Female weight sliders - More feminine version SE.\n<br />[*]Wind Ruler Armor - Scabbard SE.\n<br />[*]Wind Ruler Armor - One handed sword SE.\n<br />[*]Any aesthetic file, like color changers.\n<br />[/list]\n<br />[b][color=#76a5af]Patches\n<br />v1:\n<br />[/color][/b][list][*]2K optimized textures.\n<br />[*]HD Grey hair (original color).\n<br />[*]HD Black hair.\n<br />[*]Bigger helmets, about 10%. It includes some clipping fix too.\n<br />[*]No fur for the armors.\n<br />[*]Unenchanted helmet.\n<br />[*]Sword in a chest. It adds the Sword to the Cuirass chest (Windward Ruins). And removes it from the water. Includes the original Esl/Esp and the Unenchanted Helmet version. All with my fixes included.\n<br />[/list][b][color=#76a5af]v1.1:[/color][/b]\n<br />[list]\n<br />[*]HD red hair.\n<br />[*]Female helmet no hair.\n<br />[*]Male weight sliders.\n<br />[/list][b][color=#76a5af]v1.2:[/color][/b]\n<br />[list]\n<br />[*]A beautiful one handed sword added to the Helmet chest (Graywinter Watch). The Sword of the Loch.\n<br />[*]Scabbard for the original two handed sword.\n<br />[*]Female weight sliders - More feminine version.\n<br />[*]HD Brown hair.\n<br />[*]HIMBO version added, many thanks to Urbon.\n<br />[*]Shiny armor version.\n<br />[/list][color=#76a5af][b]v1.3:[/b][/color]\n<br />[list]\n<br />[*]Fixed the one handed sword plugin.\n<br />[/list][b][color=#76a5af]v1.31[/color][/b]\n<br />[list]\n<br />[*]Blond hair color added to the Miscellaneous Downloads.\n<br />[/list][b][color=#76a5af]v1.4[/color][/b]\n<br />[list]\n<br />[*]Added Blue, Black, Brown, Green and the original Red skirt colors. All with improved HD alpha channel and 4K-2K options.\n<br />[/list][b][color=#76a5af]v1.5[/color][/b]\n<br />[list]\n<br />[*]Only the ESP and ESL files were updated. With a weapon material fix (many thanks to BlackJusticar for the heads-up).\n<br />[/list][b][color=#76a5af]v1.6[/color][/b]\n<br />[list]\n<br />[*][b]Miscellaneous Swords Recolor[/b] file added (made by [url=https://www.nexusmods.com/skyrim/users/341957]christos[/url], thanks for sharing!).\n<br />[/list][b][color=#76a5af]v1.9[/color][/b]\n<br />[list]\n<br />[*][b]Northern God Armor Palette patch[/b] added. It will give all armor pieces the same palette color (cubemap) than the [url=https://www.nexusmods.com/skyrimspecialedition/mods/64349]Northern God Armor[/url]﻿.\n<br />[/list]\n<br />[b][color=#76a5af]Requirements[/color][/b]\n<br />[list]\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/60842]Wind Ruler Armor SE[/url]﻿ ﻿﻿by 4thUnknown.\n<br />[*]All works perfectly with [b]AE[/b] too.\n<br />[/list]\n<br />[b]I made it for my game and now I'm sharing it, I hope you like it. :)[/b]\n<br />\n<br />- [url=https://www.nexusmods.com/skyrim/mods/110299]LE version here[/url].\n<br />\n<br />[b][color=#76a5af]Especial thanks[/color][/b]\n<br />[list]\n<br />[*]To [b]Billyro [/b]for the scabbard model used as base.\n<br />[*]To [b]christos [/b]for the swords recolor version.\n<br />[*]To [url=https://www.nexusmods.com/skyrimspecialedition/users/49002333]4thUnknown [/url]﻿﻿of course, for his wonderful work as always!\n<br />[/list]\n<br />\n<br />[center][url=https://ko-fi.com/xtudo][img]https://i.imgur.com/huDtp6A.png[/img][/url][/center]\n<br />[center][size=3][b]Do you like my mods or stories?\n<br />Please support me on [url=https://www.patreon.com/Xtudo]Patreon[/url]. [/b]\n<br />[/size][url=https://www.patreon.com/Xtudo][img]https://staticdelivery.nexusmods.com/mods/1704/images/51726/51726-1625164958-1101084130.jpeg[/img][/url][/center]"
