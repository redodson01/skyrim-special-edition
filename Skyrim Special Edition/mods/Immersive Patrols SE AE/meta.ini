nexusDescription="[url=https://www.patreon.com/scrabbulor][center][img]https://i.imgur.com/GtgrPVa.jpg[/img][/center][/url]\n<br />Immersive Patrols adds Stormcloak, Thalmor, Imperial and Dawnguard patrols to Skyrim and a few roaming Skaal, Reaver and Rieklings to Solstheim. These patrols can cross paths with each other or the player creating new encounters.\n<br />\n<br />Completing the Civil War quest will disable all patrol and battle NPCs (including Thalmor) of the losing faction leaving only your troops. If you destroy the remaining enemy camps after the Civil War quest is completed, your own troops in this mod will diminish as they are no longer needed, effectively ending the Civil War within the mod as well.\n<br />\n<br />Civil War NPCs in this mod will attack you on sight depending on your allegiance. This is done using a custom faction that mimics the behavior of the \"Battle for Fort X\" Civil War quest NPCs and does not affect Vanilla (Bethesda's) NPCs. \n<br />\n<br />Dawnguard patrols within this mod will only exist after reconstruction of Fort Dawnguard has begun.\n<br />\n<br />Note: Using an \"always enabled\" version of the mod will disable the above mechanics. Civil War patrols and Dawnguard will always exist and respawn.\n<br />\n<br />\n<br />=====Important Information=====\n<br />\n<br />As of 3.0 Immersive Patrols sources it's NPC appearance from vanilla NPCs so most old patches made specifically for Immersive Patrols are no longer needed or may cause crashes. Almost all of the changes found in the mod \"Immersive Patrols Simplified\" and even it's comments were also implemented.\n<br />\n<br />NPCs respawn.\n<br />NPC stats scale 10-81.\n<br />SSEedit cleaned.\n<br />No mod dependencies.\n<br />No scripts.\n<br />No SKSE dependencies.\n<br />No mod menu.\n<br />Works mid Playthrough.\n<br />\n<br />=====Know Issues=====\n<br />\n<br />Unfortunately this mod will no longer load on Skyrim versions before 1.6.1130 without an [url=https://www.nexusmods.com/skyrimspecialedition/mods/106441]index incrementing mod[/url] ([url=https://www.nexusmods.com/skyrimspecialedition/mods/106712]VR equivalent[/url]).\n<br />\n<br />Forced Civil War Allegiance: During the Main Quest \"Season Unending,\" depending on your dialogue choices during the peace talks you will be added to one of the two Civil War factions. You will be seen as that faction by this mod's NPCs.\n<br />\n<br />Solution: You are now forced to pick a side and can no longer remain neutral. Speak to Rikke or Galmar Stone-Fist to join the faction you actually support. This change will be reflected immediately.\n<br />\n<br />Faction Change: If you join a Civil War faction THEN switch factions during the Main Quest \"Jagged Crown\" or by the use of a mod you will still be seen as the betrayed faction by this mod's NPCs until they respawn.\n<br />\n<br />Solution 1: Wait 11 in-game days in an interior to spawn new NPCs OR uninstall Immersive Patrols, save the game without it installed and then reinstall.\n<br />\n<br />Solution 2: Console Commands. Thanks to cyx19961111 for this solution! His comment is below;\n<br />\n<br />\"Another solution for PC player is use console to remove faction that keep your neutral after main quest.\n<br />\n<br />player.addtofaction 2bf9a -1(Remove from Imperial faction,if Stormcloak attack you)\n<br />player.addtofaction 2bf9b -1(Remove from Stormcloak,if Imperial attack you)\"\n<br />\n<br />Author's note: After all these years I am confident enough to solve these issues by editing the vanilla scripts that create them but I have decided to leave the mod as is, a humble esp mod with minor issues related to switching sides with known solutions.\n<br />\n<br />=====Incompatible Mods/Mods that require a small patch=====\n<br />\n<br />Mods that delete or disable the invisible vanilla enable markers from military camps.\n<br />Mods that delete or disable the Dawnguard Banners that appear during fort reconstruction."
