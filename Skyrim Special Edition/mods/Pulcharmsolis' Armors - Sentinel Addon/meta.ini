nexusDescription="[center][img]https://i.imgur.com/aFM9OOV.png[/img][/center]\n<br />\n<br />\n<br />[size=4]Add-on for Thuldor's Sentinel - An Equipment Overhaul to modularly add Pulcharmsolis' armor mods to Sentinel's leveled lists and be distributed to containers and actors. I have not added either Armor of the Velothi pt 1 or 2 for reasons. Weapons are also NOT distributed due to Skypatcher not having a way to dynamically match damage values to other items.\n<br />\n<br />With version 2.0 of this mod, the armor's damage reduction, weight, and value will match the other armors in whichever leveled list it's added to. For example, the Crown Plate Set has stats similar to vanilla ebony armor, if you add it to the iron leveled list, it's damage reduction, weight and value will reflect other iron armors and be distributed in places you'd find iron armor.\n<br />\n<br />You have the choice to add any of Pulcharmsolis' armor sets to [u]any[/u] of the leveled lists available. In the FOMOD, I've marked recommended leveled lists for each set as to minimize overlap, have more variety, and try to match aesthetically. If you'd like an armor or leveled list added, leave a suggestion and I'll try to work something out.[/size]\n<br />\n<br />\n<br />[center][img]https://i.imgur.com/aFM9OOV.png[/img][/center]\n<br />[center][u][b][size=5][color=#8e7cc3]REQUIREMENTS[/color][/size][/b][/u][/center]\n<br />[size=4][u]100% Necessary:[/u]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/106659]Skypatcher[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/100985]Sentinel - An Equipment Overhaul[/url]\n<br />\n<br />[u]At least one[/u] of the following armor mods by Pulcharmsolis:\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/79894]Colovian Prince Set[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/84971]Ferrum Nibenis[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/79226]Kvetchi Mercenary Set[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/91506]Maormer Seascale Set[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/95089]Aegis Anuad[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/100401]Easthold Totemic Set[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/103601]Wayrest Sellsword Set[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/107904]River Watch Set[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/109000]Eastern Brassplate Set[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/110420]Balfieran Knight Set[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/114751]Crown Plate Set[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/120576]Rihad Swordsman Set[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/126178]Pig Iron Set[/url]\n<br />\n<br />[b][u]! IMPORTANT ![/u][/b]\n<br />ONLY this set REQUIRES Xtudo's Fixes as the original set are clothes and have no armor rating\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/135136]Riverfolk Clothes[/url] - [url=https://www.nexusmods.com/skyrimspecialedition/mods/136348]Xtudo's Fixes[/url]\n<br />\n<br />\n<br />[center][img]https://i.imgur.com/aFM9OOV.png[/img][/center]\n<br />[/size][center][size=4][b][size=5][color=#c27ba0]COMPATIBILITY[/color][/size][/b][/size][/center][size=4]\n<br />[size=4]- Be sure to install the latest Skypatcher.\n<br />- Sentinel v3.0+ is required, earlier versions will not work.\n<br />- Can be installed/uninstalled/updated mid-playthrough.\n<br />- Works with any version of the armors, Xtudo's, HIMBO, 3BA, PBR doesn't matter.[/size]\n<br />\n<br />\n<br />[center][img]https://i.imgur.com/aFM9OOV.png[/img][/center]\n<br />[center][b][size=5][color=#c27ba0]FAQ[/color][/size][/b][/center]\n<br />[size=4][i]Q: Can you make them spawn full sets onto npc's instead of mismatched sets?[/i]\n<br />A: No, I could if I added a plugin and made my own leveled lists, but that's kind of outside of the scope. I recommended LL's for each armor in the fomod that they'd fit with aesthetically.\n<br />\n<br />[i]Q: Could you add a version that doesn't edit the armor values?[/i]\n<br />A: No, delete the folder \"../SKSE/plugins/SkyPatcher/armor/\" if you don't want the stats edited.\n<br />\n<br />[i]Q: Tempering and crafting still requires the old resources, could you edit these to reflect what LL they're in?[/i]\n<br />A: It's planned, but some armors don't have crafting recipes at all, and some have weird perk requirements which I can't edit via skypatcher so we'll see...\n<br />[/size]\n<br />\n<br />\n<br />[center][img]https://i.imgur.com/aFM9OOV.png[/img][/center]\n<br />[center][size=5][b][color=#ffd966]CREDITS[/color][/b][/size][/center]\n<br />[url=https://next.nexusmods.com/profile/Pulcharmsolis]Pulcharmsolis[/url] - For all their incredible armors\n<br />[url=https://next.nexusmods.com/profile/Thuldor3621?gameId=1704]Thuldor3621[/url] - For Sentinel - An Equipment Overhaul\n<br />[url=https://next.nexusmods.com/profile/Zzyxzz?gameId=1704]Zzyxzz[/url] - For Skypatcher[/size]"
