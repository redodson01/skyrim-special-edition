nexusDescription="[center][size=4][img]https://staticdelivery.nexusmods.com/mods/110/images/headers/117519_1706796381.jpg[/img]﻿\n<br />[/size][color=#dd7e6b][size=5][b]KVETCHI MERCENARY SET[/b][/size][/color][/center][center][color=#cc4125][size=4][b]My patches by Xtudo[/b][/size][/color][/center][b]\n<br />[color=#dbb0a7]Description[/color][/b]\n<br />[b]My patches and tweaks for this amazing mod.[/b]\n<br />[list]\n<br />[*]Added missing races to the Helmet and Gauntlets.\n<br />[*]Removed ITM records.\n<br />[*]Carried on Unofficial Patch fixes.\n<br />[*]Changed to \"Initially Disabled\" a previously deleted NPC reference, to avoid possible CTDs.\n<br />[*]Recipe requirements changed to Steel Smithing Perk, from Advanced Light Armors Perk, as it is a Heavy Steel Plate Armor.\n<br />[*]Some minor fixes to the armor chest textures.\n<br />[*]Fixed \"hole\" in the Sword model. Added missing blood effects to it.\n<br />[*]Fixed neck clipping trough the armor while not using the helmet.\n<br />[*]Edited helmet clothing to avoid clipping with the back of the armor.\n<br />[*]Improved collision of ground items.\n<br />[*]Added missing legs to the armors.\n<br />[*]Added \"Warm\" keyword for the Survival mode.\n<br />[*]ESL file that works with any Skyrim version. It will replace the original KvetchiMercenary.esl file.\n<br />[*]The default Main Fixes file is fully compatible with 3BA, SAM or similar patches.\n<br />[*][b]Optional Non-HDT[/b] patch. All fixes already included. Non compatible with 3BA or similar patches.\n<br />[*][b]Optional Light Armor version.[/b] It adds an extra light armored version, while keeping the original heavy as well. So, you will have the two versions available in-game. Advanced Armors Smithing Crafting Perk required. Requires one of the Main files installed first. It's safe to install mid-game, you won't loose any already crafted item.\n<br />[*][b]Optional Vanilla Iron Armor replacer. [/b]Requires one of the Main files installed first.\n<br />[/list]\n<br />[b]I made it for my game and now I'm sharing it, I hope you like it.\n<br />\n<br />[/b]- [url=https://www.nexusmods.com/skyrim/mods/117519]LE version here[/url].\n<br />\n<br />[b][color=#dbb0a7]Credits[/color][/b]\n<br />[list]\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/users/3180451][/url][url=https://www.nexusmods.com/skyrimspecialedition/users/122433248]Pulcharmsolis[/url] for his wonderful work.\n<br />[/list]\n<br />[b][color=#dbb0a7]Especial thanks[/color][/b][list]\n<br />[*]To [b]Pulcharmsolis [/b]and to my lovely [url=https://www.patreon.com/Xtudo]Patreons[/url]﻿ and supporters.\n<br />[/list]\n<br />[center][url=https://ko-fi.com/xtudo][img]https://i.imgur.com/huDtp6A.png[/img][/url][/center]\n<br />[size=3][center][b]Hello friends! Do you like my mods or stories?\n<br />Please support me on [url=https://www.patreon.com/Xtudo]Patreon[/url].[/b][/center][/size][url=https://www.patreon.com/Xtudo][img]https://staticdelivery.nexusmods.com/mods/1704/images/51726/51726-1625164958-1101084130.jpeg[/img][/url]"
