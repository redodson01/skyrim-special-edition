nexusDescription="[center][img]https://i.imgur.com/aFM9OOV.png[/img][/center]\n<br />\n<br />\n<br />[size=4]Add-on for Thuldor's [url=https://www.nexusmods.com/skyrimspecialedition/mods/100985]Sentinel - An Equipment Overhaul[/url] to modularly add 4thUnknown's armor mods to Sentinel's leveled lists and be distributed to containers and actors. I haven't added [i]every[/i] armor 4thUnknown has made, but if you have suggestions for his other work I'm willing to extend this.\n<br />\n<br />With version 2.0 of this mod, the armor's damage reduction, weight, and value will match the other armors in whichever leveled list it's added to. For example, the Dremora Markynaz set has stats similar to vanilla daedric armor, if you add it to the iron leveled list, it's damage reduction, weight and value will reflect other iron armors and be distributed in places you'd find iron armor.[/size]\n<br />\n<br />\n<br />[center][img]https://i.imgur.com/aFM9OOV.png[/img][/center]\n<br />[center][b][size=5][color=#8e7cc3]REQUIREMENTS[/color][/size][/b][/center]\n<br />[size=4][url=https://www.nexusmods.com/skyrimspecialedition/mods/106659]Skypatcher[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/100985]Sentinel - An Equipment Overhaul[/url]\n<br />\n<br />[u]At least one[/u] of the following armor mods by 4thUnknown:\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/100724]Ancient Argonian Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/142655]Ancient Imperial Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/81043]Dwemer Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/62871]Falconer Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/106381]Fluted Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/88099]Infantry Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/79753]Dremora Markynaz Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/84280]Mythic Dawn Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/63772]Northern God Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/94544]One-Winged Swift Outfit SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/79088]Silver Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/77534]Three-eyed Swallow Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/60842]Wind Ruler Armor SE[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/112454]Ysmir Armor SE[/url]\n<br />(Works with either ESP or ESL plugin)[/size]\n<br />\n<br />\n<br />[center][img]https://i.imgur.com/aFM9OOV.png[/img][/center]\n<br />[center][b][size=5][color=#c27ba0]COMPATIBILITY[/color][/size][/b][/center]\n<br />[size=4]- Be sure to install the latest Skypatcher.\n<br />- Sentinel v3.0+ is required, earlier versions will not work.\n<br />- Can be installed/uninstalled/updated mid-playthrough.\n<br />- Works with any version of the armors, Xtudo's, HDT-SMP, or PBR doesn't matter.[/size]\n<br />\n<br />[center][img]https://i.imgur.com/aFM9OOV.png[/img][/center]\n<br />[center][b][size=5][color=#c27ba0]FAQ[/color][/size][/b][/center]\n<br />[size=4][i]Q: Can you make them spawn full sets onto npc's instead of mismatched sets?[/i]\n<br />A: No, I could if I added a plugin and made my own leveled lists, but that's kind of outside of the scope. I recommended LL's for each armor in the fomod that they'd fit with aesthetically.\n<br />\n<br />[i]Q: Could you add a version that doesn't edit the armor values?[/i]\n<br />A: No, delete the folder \"../SKSE/plugins/SkyPatcher/armor/\" if you don't want the stats edited.\n<br />\n<br />[i]Q: Tempering and crafting still requires the old resources, could you edit these to reflect what LL they're in?[/i]\n<br />A: It's planned, but some armors don't have crafting recipes at all, and some have weird perk requirements which I can't edit via skypatcher so we'll see...\n<br />[/size]\n<br />\n<br />[center][img]https://i.imgur.com/aFM9OOV.png[/img][/center]\n<br />[center][b][size=5][color=#ffd966]CREDITS[/color][/size][/b][/center]\n<br />[size=4][url=https://next.nexusmods.com/profile/4thUnknown]4thUnknown[/url] - For all of their amazing armor mods\n<br />[url=https://next.nexusmods.com/profile/Thuldor3621?gameId=1704]Thuldor3621[/url] - For Sentinel - An Equipment Overhaul\n<br />[url=https://next.nexusmods.com/profile/Zzyxzz?gameId=1704]Zzyxzz[/url] - For Skypatcher[/size]"
