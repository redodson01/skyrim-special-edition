nexusDescription="[color=#6d9eeb][size=3][b]Description[/b][/size][size=2][b]\n<br />[/b][/size][/color][size=2]\n<br />This mod makes farmers, miners and fishermen of Skyrim vendors. \n<br />[/size][list]\n<br />[*][size=2]Farmers that buy crops from you in vanilla (except Severio Pelagia, whose produce is being sold by Nimriel, since Severio's voicetype has no vendor dialogues) and Loreius are merchants. They sell their harvest, flour, chicken eggs, milk, cheese and butter, depending on what they have on the farm. They don't sell many items, since they also feed nearby settlements, inns and themselves, and their inventory respawns often anyway. The number of items depends on how many they have on the farm.[/size]\n<br />[*][size=2]﻿Miners that buy ore from you in vanilla, Aienitach and Evul Seloth are merchants (in orcish strongholds blacksmiths take this role). They sell ore from their mine, ingots made from it and may also sell a couple of gems. The number of items depends on how many workers work in the mine.[/size]\n<br />[*][size=2]Fishermen across Skyrim sell fish and some related ingredients.[/size]\n<br />[*][size=2]Farmers, miners, fishermen and hunters won't pay anything to you if you sell something to them, unless you have Merchant perk (they don't resell).[/size]\n<br />[*][size=2]The number of items sold is balanced (i believe).[/size]\n<br />[*][size=2]This mod uses [url=https://www.nexusmods.com/skyrimspecialedition/mods/36869]SPID[/url]﻿, [url=https://www.nexusmods.com/skyrimspecialedition/mods/55728]KID[/url]﻿, [size=2][url=https://www.nexusmods.com/skyrimspecialedition/mods/22854]powerofthree's Papyrus Extender[/url]﻿[/size] and [url=https://www.nexusmods.com/skyrimspecialedition/mods/120152]Container Distribution Framework[/url]﻿/[size=2][url=https://www.nexusmods.com/skyrimspecialedition/mods/106659]SkyPatcher[/url]﻿[/size]﻿ in order to avoid conflicts with other mods that other similar mods have.[/size]\n<br />[/list][size=3][b][color=#6d9eeb]Requirements[/color][/b][/size][size=2][color=#6d9eeb][b]\n<br />[/b][/color]\n<br />The mod requires:\n<br />[/size][list]\n<br />[*][size=2][url=https://www.nexusmods.com/skyrimspecialedition/mods/36869]Spell Perk Item Distributor[/url]﻿[/size]\n<br />[*][size=2][url=https://www.nexusmods.com/skyrimspecialedition/mods/55728]Keyword Item Distributor[/url]﻿[/size]\n<br />[*][size=2][url=https://www.nexusmods.com/skyrimspecialedition/mods/22854]powerofthree's Papyrus Extender[/url]﻿[/size]\n<br />[/list][size=2]The optional Orc Stronghold Blacksmiths module has two versions (you can choose in the installer):[/size]\n<br />[list]\n<br />[*][size=2]for [url=https://www.nexusmods.com/skyrimspecialedition/mods/120152]Container Distribution Framework﻿[/url] [size=2](patch for v1.5.97 is [url=https://www.nexusmods.com/skyrimspecialedition/mods/120386]here[/url]﻿)[/size][/size]\n<br />[*][size=2]for [url=https://www.nexusmods.com/skyrimspecialedition/mods/106659]SkyPatcher[/url]﻿ (requires [b]iAllowLeveledListsAddedToContainers=1[/b] in SkyPatcher.ini)[/size]\n<br />[/list][size=2][size=3][color=#6d9eeb][b]Compatibility[/b][/color][/size]\n<br />\n<br />[list]\n<br />[*][size=2]This mod doesn't edit any vanilla records except for one fisherman reference in the CC Fishing patch and therefore direct conflicts with other mods are very unlikely.[/size]\n<br />[*][size=2]If you have another mod that adds ore from the orc stronghold mines to the stronghold blacksmiths, disable the [size=2]Orc Stronghold Blacksmiths[/size] module in the installer.[/size]\n<br />[*][size=2]An optional integration patch for [b]CC Fishing[/b] is available in the installer, it makes fishermen sell the new fish.[/size]\n<br />[*][size=2]An optional addon for [url=https://www.nexusmods.com/skyrimspecialedition/mods/103440]Simple Fishing Overhaul[/url]﻿ is [size=2]available in the installer[/size], it makes fishermen also sell some bait.[/size]\n<br />[*][size=2]A consistency patch for [url=https://www.nexusmods.com/skyrimspecialedition/mods/23081]Trade &amp; Barter[/url]﻿ is available in the installer, it makes T&amp;B recognize all of the new vendors as merchants of type \"Producers\" and modify their prices accordingly.[/size]\n<br />[*][size=2]The installer has multiple options for the ore sold by Redbelly Mine to match your mods.[/size]\n<br />[/list][/size][color=#6d9eeb][size=3][b]FAQ[/b][/size][/color][size=2]\n<br />\n<br />[b]Isn't it useless because i can just take their crops and ores myself?[/b]\n<br />They also sell other items and you can get more items if you need. But it will be much more useful and immersive if you have mods that prevent you from freely taking their crops and ores, such as [url=https://www.nexusmods.com/skyrimspecialedition/mods/26138]Landscape and Water Fixes[/url] + [url=https://www.nexusmods.com/skyrimspecialedition/mods/40145/]Favor Jobs Overhaul[/url].\n<br />\n<br />[b]I installed the mod but they are still not vendors[/b]\n<br />You don't have SPID installed or it doesn't work.\n<br />\n<br />[b]I installed the mod and they are vendors but farmers and fishermen don't sell any items[/b]\n<br />You don't have KID installed or it doesn't work.\n<br />\n<br />[b]How do i disable some of the components other than orcish strongholds?[/b]\n<br />Edit the SPID config (Producers of Skyrim_DISTR.ini).\n<br />\n<br />[b]I wanted to add other items to farmers or fishermen, but it doesn't work[/b]\n<br />You need to add the new items to the KID config (or create a separate config). I limited the items sold by a custom keyword distributed with KID so they don't sell random food from their pockets.\n<br />[/size][line][center]\n<br />[b][color=#6d9eeb][size=3]Check my other mods:[/size][/color][/b]\n<br />\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/40145]Favor Jobs Overhaul[/url]﻿ | [url=https://www.nexusmods.com/skyrimspecialedition/mods/73887]More Sensible Quartermasters[/url]﻿ | [url=https://www.nexusmods.com/skyrimspecialedition/mods/78177]Rent Inn Room for Longer Time and Extend Time[/url]﻿ | [url=https://www.nexusmods.com/skyrimspecialedition/mods/127489]Merchants Sell Mage Hoods[/url]﻿ | [url=https://next.nexusmods.com/profile/lilebonymace/mods?gameId=1704]and more[/url]﻿[/center]"
